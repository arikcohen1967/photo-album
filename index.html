<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">

<title>האתר של ליאן</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,"Segoe UI",sans-serif;
  min-height:100vh;
  text-align:center;
  color:#fff;
  background:
    radial-gradient(circle at 15% 10%,rgba(255,45,85,.35),transparent 25%),
    radial-gradient(circle at 85% 15%,rgba(0,122,255,.35),transparent 28%),
    radial-gradient(circle at 50% 95%,rgba(90,200,250,.22),transparent 30%),
    linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
  overflow-x:hidden;
}

body:before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
  background-size:42px 42px;
  pointer-events:none;
}

header{
  padding:55px 20px 25px;
  position:relative;
  z-index:1;
}

.badge{
  display:inline-block;
  padding:9px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.24);
  backdrop-filter:blur(18px);
  font-size:13px;
  font-weight:900;
  letter-spacing:1px;
  margin-bottom:18px;
}

h1{
  font-size:48px;
  margin:0;
  text-shadow:0 10px 30px rgba(0,0,0,.25);
}

p{
  font-size:22px;
  color:rgba(255,255,255,.82);
  margin:12px 0 0;
}

.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:24px;
  max-width:1250px;
  margin:38px auto;
  padding:20px;
  position:relative;
  z-index:1;
}

.card{
  position:relative;
  overflow:hidden;
  min-height:185px;
  border-radius:32px;
  padding:32px 18px;
  text-decoration:none;
  color:white;
  font-size:24px;
  font-weight:900;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.22);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  box-shadow:0 20px 50px rgba(0,0,0,.22);
  transition:.25s ease;
}

.card:before{
  content:"";
  position:absolute;
  inset:-40%;
  background:radial-gradient(circle,rgba(255,255,255,.28),transparent 35%);
  opacity:0;
  transition:.25s;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
  box-shadow:0 30px 70px rgba(0,0,0,.32);
}

.card:hover:before{
  opacity:1;
}

.icon{
  font-size:64px;
  display:block;
  margin-bottom:16px;
  filter:drop-shadow(0 10px 18px rgba(0,0,0,.25));
}

.card span,
.card{
  position:relative;
  z-index:1;
}

.album{background:linear-gradient(135deg,rgba(255,45,85,.55),rgba(255,149,0,.35));}
.solitaire{background:linear-gradient(135deg,rgba(88,86,214,.55),rgba(0,122,255,.35));}
.trivia{background:linear-gradient(135deg,rgba(52,199,89,.50),rgba(90,200,250,.35));}
.memory{background:linear-gradient(135deg,rgba(255,204,0,.50),rgba(255,45,85,.35));}
.alias{background:linear-gradient(135deg,rgba(175,82,222,.55),rgba(255,45,85,.35));}
.budget{background:linear-gradient(135deg,rgba(48,209,88,.55),rgba(0,122,255,.35));}
.gym{background:linear-gradient(135deg,rgba(0,255,255,.45),rgba(0,122,255,.50),rgba(175,82,222,.42));}
.drawing{background:linear-gradient(135deg,rgba(255,45,85,.45),rgba(175,82,222,.40));}
.comic{background:linear-gradient(135deg,rgba(255,149,0,.48),rgba(255,45,85,.38));}

footer{
  color:rgba(255,255,255,.75);
  padding:30px;
  position:relative;
  z-index:1;
}

@media(max-width:700px){
  header{
    padding:36px 14px 10px;
  }

  h1{
    font-size:34px;
  }

  p{
    font-size:18px;
  }

  .menu{
    gap:18px;
    padding:14px;
    margin-top:25px;
  }

  .card{
    min-height:155px;
    font-size:22px;
    border-radius:26px;
  }

  .icon{
    font-size:54px;
  }
}
</style>
</head>

<script>
function playClickSound(){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 520;

    gain.gain.setValueAtTime(0.001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.11);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.12);
  }catch(e){}
}

document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click",playClickSound);
});
</script>
