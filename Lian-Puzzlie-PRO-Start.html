<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lian Puzzle PRO</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#0f172a;color:#fff}
header{padding:24px;text-align:center;background:linear-gradient(135deg,#1e293b,#334155)}
h1{margin:0}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:16px;padding:20px;max-width:1100px;margin:auto
}
.card{
background:#1e293b;border-radius:20px;overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.3);
cursor:pointer;transition:.25s
}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;height:140px;object-fit:cover}
.card h3{padding:12px;margin:0}
.panel{
max-width:900px;margin:20px auto;padding:20px;background:#111827;
border-radius:20px
}
.btn{
border:none;border-radius:12px;padding:12px 18px;
margin:6px;cursor:pointer;font-size:16px
}
.easy{background:#22c55e}.mid{background:#f59e0b}.hard{background:#ef4444}
.note{text-align:center;color:#cbd5e1}
</style>
</head>
<body>
<header>
<h1>🧩 Lian Puzzle PRO</h1>
<p>גרסה ראשונית מקצועית</p>
</header>

<div class="panel">
<h2>בחר קטגוריה</h2>
<p>קושי: 20 / 40 / 75 חלקים</p>
<button class="btn easy">קל - 20</button>
<button class="btn mid">בינוני - 40</button>
<button class="btn hard">קשה - 75</button>
</div>

<div class="grid">
<div class="card"><img src="https://picsum.photos/600/400?1"><h3>🌅 שקיעה בים</h3></div>
<div class="card"><img src="https://picsum.photos/600/400?2"><h3>🏔️ הרי שלג</h3></div>
<div class="card"><img src="https://picsum.photos/600/400?3"><h3>🌲 יער קסום</h3></div>
<div class="card"><img src="https://picsum.photos/600/400?4"><h3>🏰 טירה</h3></div>
<div class="card"><img src="https://picsum.photos/600/400?5"><h3>🐼 פנדה</h3></div>
<div class="card"><img src="https://picsum.photos/600/400?6"><h3>🚀 חלל</h3></div>
</div>

<p class="note">שלב ראשון: עיצוב וקטלוג תמונות. בשלב הבא נוסיף מנוע פאזל מלא עם 20/40/75 חלקים, טיימר, XP, מטבעות ושיאים.</p>
</body>
</html>
