<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #8fd3f4, #84fab0);
      color: #213547;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .game {
      width: 100%;
      max-width: 850px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.18);
      padding: 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .game::before {
      content: "⭐";
      position: absolute;
      font-size: 90px;
      opacity: 0.12;
      top: -15px;
      left: 25px;
      transform: rotate(-20deg);
    }

    h1 {
      margin: 5px 0 10px;
      font-size: clamp(28px, 5vw, 46px);
      color: #ff6b6b;
    }

    .subtitle {
      margin: 0 0 20px;
      font-size: 18px;
      color: #3d5a80;
    }

    .top-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: #f4f7ff;
      border-radius: 16px;
      padding: 12px;
      font-weight: bold;
      border: 2px solid #e4ebff;
    }

    .progress-wrap {
      width: 100%;
      height: 16px;
      background: #e9eef7;
      border-radius: 999px;
      overflow: hidden;
      margin: 15px 0 20px;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff9a9e, #fad0c4, #84fab0);
      transition: width 0.3s ease;
    }

    .question-box {
      background: linear-gradient(135deg, #fff7ad, #ffe4e1);
      padding: 24px;
      border-radius: 22px;
      margin-bottom: 20px;
      border: 3px solid #fff;
    }

    #question {
      font-size: clamp(22px, 4vw, 31px);
      margin: 0;
      line-height: 1.35;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 20px 0;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 18px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .answer {
      background: #ffffff;
      color: #213547;
      border: 3px solid #dbe7ff;
      min-height: 72px;
    }

    .answer:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.13);
      background: #f8fbff;
    }

    .answer.correct {
      background: #78e08f;
      border-color: #38ada9;
      color: #064420;
    }

    .answer.wrong {
      background: #ff7675;
      border-color: #d63031;
      color: white;
    }

    .answer:disabled {
      cursor: not-allowed;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .main-btn {
      background: #5f27cd;
      color: white;
      box-shadow: 0 8px 16px rgba(95,39,205,0.25);
    }

    .main-btn:hover {
      transform: translateY(-2px);
    }

    .secondary-btn {
      background: #00d2d3;
      color: #063b3b;
    }

    .home-btn {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      background: #ff9f43;
      color: white;
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: bold;
    }

    #feedback {
      min-height: 32px;
      font-size: 22px;
      font-weight: bold;
      margin: 8px 0;
    }

    .hidden {
      display: none;
    }

    .result-card {
      background: linear-gradient(135deg, #dff9fb, #f8c291);
      border-radius: 24px;
      padding: 25px;
      margin-top: 15px;
    }

    .big-score {
      font-size: 54px;
      color: #5f27cd;
      margin: 10px 0;
      font-weight: 900;
    }

    @media (max-width: 650px) {
      .game {
        padding: 18px;
      }

      .answers {
        grid-template-columns: 1fr;
      }

      .top-bar {
        grid-template-columns: 1fr;
      }

      button {
        font-size: 17px;
      }
    }
  </style>
</head>

        <button class="main-btn" onclick="startGame()">התחלת משחק</button>
      </div>
      <a class="home-btn" href="index.html">⬅ חזרה לעמוד הבית</a>
    </section>

    <section id="quiz-screen" class="hidden">

      <div class="top-bar">
        <div class="stat">שאלה: <span id="question-number">1</span>/<span id="total-questions">150</span></div>
        <div class="stat">ניקוד: <span id="score">0</span></div>
        <div class="stat">נכונות: <span id="correct-count">0</span></div>
      </div>

      <div class="progress-wrap">
        <div id="progress" class="progress"></div>
      </div>

      <div class="question-box">
        <h2 id="question"></h2>
      </div>

      <div id="answers" class="answers"></div>

      <div id="feedback"></div>

      <div class="controls">
        <button id="next-btn" class="main-btn hidden" onclick="nextQuestion()">שאלה הבאה ➜</button>
        <button class="secondary-btn" onclick="restartGame()">התחל מחדש</button>
      </div>
    </section>

    <section id="end-screen" class="hidden">
      <h1>🏆 סיימתם!</h1>
      <div class="result-card">
        <p>התוצאה שלכם:</p>
        <div class="big-score"><span id="final-score">0</span>/150</div>
        <p id="final-message"></p>
      </div>
      <div class="controls">

      </div>
      <a class="home-btn" href="index.html">⬅ חזרה לעמוד הבית</a>
    </section>
  </main>

                  "פרה"
            ],
            "correct": 0
      },
      {
            "question": "מהו שם האתר שבו רואים סרטונים רבים?",
            "answers": [
                  "YouTube",
                  "Excel",
                  "Word",
                  "Paint"
            ],
            "correct": 0
      },
      {
            "question": "מהי בירת הודו?",
            "answers": [
                  "מומבאי",
                  "ניו דלהי",
                  "גואה",
                  "בנגלור"
            ],
            "correct": 1
      },
      {
            "question": "איזה ספורט כולל שער, כדור וידיים אך אסור לשחקני שדה בכדורגל להשתמש בידיים?",
            "answers": [
                  "כדוריד",
                  "שחייה",
                  "ריצה",
                  "טניס"
            ],
            "correct": 0
      },
      {
            "question": "מהו ההפך מרעש?",
            "answers": [
                  "שקט",
                  "אור",
                  "חום",
                  "מים"
            ],
            "correct": 0
      }
];

    let shuffledQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let correctCount = 0;
    let answered = false;

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const endScreen = document.getElementById("end-screen");
    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const questionNumberEl = document.getElementById("question-number");
    const totalQuestionsEl = document.getElementById("total-questions");
    const scoreEl = document.getElementById("score");
    const correctCountEl = document.getElementById("correct-count");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const progressEl = document.getElementById("progress");

    totalQuestionsEl.textContent = questions.length;

    function shuffleArray(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function startGame() {
      shuffledQuestions = shuffleArray(questions);
      currentIndex = 0;
      score = 0;
      correctCount = 0;
      answered = false;

      startScreen.classList.add("hidden");
      endScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");

      showQuestion();
    }

    function showQuestion() {
      answered = false;
      feedbackEl.textContent = "";
      nextBtn.classList.add("hidden");
      answersEl.innerHTML = "";

      const current = shuffledQuestions[currentIndex];
      questionEl.textContent = current.question;
      questionNumberEl.textContent = currentIndex + 1;
      scoreEl.textContent = score;
      correctCountEl.textContent = correctCount;
      progressEl.style.width = ((currentIndex) / questions.length) * 100 + "%";

      current.answers.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.className = "answer";
        btn.textContent = answer;
        btn.onclick = () => chooseAnswer(btn, index);
        answersEl.appendChild(btn);
      });
    }

    function chooseAnswer(button, selectedIndex) {
      if (answered) return;
      answered = true;

      const current = shuffledQuestions[currentIndex];
      const allButtons = document.querySelectorAll(".answer");

      allButtons.forEach((btn, index) => {
        btn.disabled = true;
        if (index === current.correct) {
          btn.classList.add("correct");
        }
      });

      if (selectedIndex === current.correct) {
        score++;
        correctCount++;
        button.classList.add("correct");
        feedbackEl.textContent = "כל הכבוד! תשובה נכונה ✅";
        feedbackEl.style.color = "#138a36";
      } else {
        button.classList.add("wrong");
        feedbackEl.textContent = "לא נורא! התשובה הנכונה מסומנת בירוק 🙂";
        feedbackEl.style.color = "#d63031";
      }

      scoreEl.textContent = score;
      correctCountEl.textContent = correctCount;
      nextBtn.classList.remove("hidden");
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= shuffledQuestions.length) {
        finishGame();
      } else {
        showQuestion();
      }
    }

    function finishGame() {
      quizScreen.classList.add("hidden");
      endScreen.classList.remove("hidden");
      progressEl.style.width = "100%";

      document.getElementById("final-score").textContent = score;

      const percent = Math.round((score / questions.length) * 100);
      let message = "";

      if (percent >= 90) {
        message = "אלופים! ידע מטורף! 🌟";
      } else if (percent >= 75) {
        message = "מצוין! אתם ממש חזקים בטריוויה 💪";
      } else if (percent >= 50) {
        message = "יפה מאוד! עוד משחק ותשתפרו עוד יותר 😊";
      } else {
        message = "העיקר שנהניתם! נסו שוב ותפתיעו את עצמכם 🚀";
      }

      document.getElementById("final-message").textContent = message;
    }

    function restartGame() {
      startGame();
    }
  </script>
