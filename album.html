<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אלבום התמונות</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f7fa;
}
header{
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:white;
  text-align:center;
  padding:45px 20px;
}
h1{margin:0;font-size:40px;}
.back{
  text-align:center;
  margin:25px;
}
.back a{
  background:#2563eb;
  color:white;
  padding:12px 24px;
  border-radius:12px;
  text-decoration:none;
  font-size:18px;
}
.gallery{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.photo{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,.15);
}
.photo img{
  width:100%;
  height:250px;
  object-fit:cover;
}
.caption{
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}
footer{
  margin-top:40px;
  background:#111827;
  color:white;
  text-align:center;
  padding:25px;
}
</style>
</head>
<body>

<header>
  <h1>📸 אלבום התמונות המשפחתי</h1>
</header>

<div class="back">
  <a href="index.html">⬅ חזרה לדף הבית</a>
</div>

<div class="gallery">
  <div class="photo">
    <img src="images/photo1.jpg" alt="תמונה 1">
    <div class="caption">תמונה משפחתית</div>
  </div>

  <div class="photo">
    <img src="images/photo2.jpg" alt="תמונה 2">
    <div class="caption">חופשה משפחתית</div>
  </div>

  <div class="photo">
    <img src="images/photo3.jpg" alt="תמונה 3">
    <div class="caption">יום כיף</div>
  </div>

  <div class="photo">
    <img src="images/photo4.jpg" alt="תמונה 4">
    <div class="caption">זיכרון מתוק</div>
  </div>
</div>

<footer>
  © 2026 משפחת כהן
</footer>

</body>
</html>
