<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lian Pet Tycoon ULTIMATE 4 PRO</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#14305f;--muted:#64748b;--card:rgba(255,255,255,.86);--line:rgba(255,255,255,.92);
  --shadow:0 18px 48px rgba(36,90,130,.22);--pink:#ff5fb2;--blue:#38bdf8;--green:#48c774;--gold:#ffc533;--purple:#8b5cf6;
}
html,body{margin:0;min-height:100%;font-family:Arial,"Segoe UI",sans-serif;color:var(--ink);overflow-x:hidden;background:linear-gradient(180deg,#63d8ff 0%,#b9f4ff 36%,#a7e977 74%,#62c861 100%)}
body.night{background:linear-gradient(180deg,#10224d 0%,#22305f 42%,#235b45 100%);color:#eef6ff}
body:before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(circle at 18% 13%,rgba(255,255,255,.95),transparent 7%),radial-gradient(circle at 74% 18%,rgba(255,255,255,.82),transparent 9%),radial-gradient(circle at 88% 42%,rgba(255,255,255,.72),transparent 7%),radial-gradient(ellipse at 50% 83%,rgba(58,173,74,.55),transparent 30%)}
body.night:before{background:radial-gradient(circle at 18% 15%,rgba(255,255,220,.95),transparent 4%),radial-gradient(circle at 78% 21%,rgba(255,255,255,.75),transparent 1.2%),radial-gradient(circle at 40% 12%,rgba(255,255,255,.62),transparent 1.1%),radial-gradient(ellipse at 50% 86%,rgba(28,100,72,.55),transparent 30%)}
button{font-family:inherit;cursor:pointer;border:0} .app{width:min(980px,100%);margin:0 auto;padding:14px 14px 110px}.screen{display:none}.screen.active{display:block;animation:fade .22s ease both}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.top{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;align-items:stretch}.card{background:var(--card);border:3px solid var(--line);border-radius:30px;box-shadow:var(--shadow);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px)}
.hero{padding:12px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}.lian-photo{width:86px;height:86px;border-radius:50%;background:linear-gradient(180deg,#fff,#ffe8f5);display:grid;place-items:center;font-size:44px;overflow:hidden;border:5px solid #fff;box-shadow:0 12px 28px rgba(0,0,0,.16);transition:.18s}.lian-photo.big{transform:scale(1.08)}.lian-photo img{width:100%;height:100%;object-fit:cover}.hero h1{margin:0;font-size:clamp(25px,5vw,40px);line-height:1;color:#12336e}.hero p{margin:7px 0 0;font-weight:900;color:#59708f}.round{width:58px;height:58px;border-radius:20px;background:#fff;font-size:28px;box-shadow:inset 0 -4px 0 rgba(0,0,0,.05),0 10px 20px rgba(0,0,0,.1)}
.stats{padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.stat{background:rgba(255,255,255,.72);border-radius:22px;text-align:center;padding:8px 4px;font-weight:1000}.stat i{font-style:normal;font-size:28px;display:block}.stat b{font-size:20px;display:block}.stat small{color:var(--muted);font-weight:900}
.home-world{height:470px;margin-top:12px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.22));border-radius:36px}.sunmoon{position:absolute;left:22px;top:20px;width:62px;height:62px;border-radius:50%;background:#ffd34d;box-shadow:0 0 40px rgba(255,211,77,.8);display:grid;place-items:center;font-size:30px}.night .sunmoon{background:#f3f4f6;box-shadow:0 0 32px rgba(255,255,255,.55)}
.house{position:absolute;right:50%;top:52px;transform:translateX(50%);width:300px;height:210px}.roof{position:absolute;top:0;right:15px;width:270px;height:130px;background:linear-gradient(135deg,#ff79b6,#ffb1d6);clip-path:polygon(50% 0,100% 72%,0 72%);filter:drop-shadow(0 12px 12px rgba(0,0,0,.15))}.homebase{position:absolute;bottom:0;right:0;width:300px;height:145px;border-radius:28px;background:linear-gradient(180deg,#fff9e8,#fff);border:5px solid #fff;box-shadow:0 18px 36px rgba(0,0,0,.16)}.door{position:absolute;bottom:0;right:128px;width:54px;height:82px;border-radius:26px 26px 8px 8px;background:#a16207}.window{position:absolute;top:65px;width:54px;height:48px;border-radius:18px;background:#9be7ff;border:5px solid #fff}.w1{right:40px}.w2{left:40px}
.path{position:absolute;right:50%;bottom:-28px;width:170px;height:210px;transform:translateX(50%);background:linear-gradient(180deg,#f8d68d,#eab668);clip-path:polygon(40% 0,60% 0,100% 100%,0 100%);opacity:.9}.tree{position:absolute;bottom:70px;font-size:92px;filter:drop-shadow(0 12px 8px rgba(0,0,0,.14))}.t1{right:20px}.t2{left:20px}.pool{position:absolute;left:24px;bottom:28px;width:130px;height:72px;border-radius:50%;background:radial-gradient(circle,#8ff5ff,#18a9e8);border:8px solid rgba(255,255,255,.75)}.flowers{position:absolute;right:20px;bottom:18px;font-size:38px;letter-spacing:7px}.lian-mini{position:absolute;right:calc(50% - 144px);bottom:130px;font-size:66px;animation:bob 2s ease-in-out infinite}.cat{position:absolute;right:calc(50% + 38px);bottom:102px;font-size:58px;animation:catwalk 5s ease-in-out infinite;filter:drop-shadow(0 10px 8px rgba(0,0,0,.13))}.cat.sleep{animation:sleepy 2s ease-in-out infinite}.bubble{position:absolute;right:calc(50% + 70px);bottom:185px;background:#fff;border:3px solid rgba(255,255,255,.95);border-radius:22px;padding:9px 12px;font-weight:1000;box-shadow:var(--shadow);max-width:190px}@keyframes bob{50%{transform:translateY(-5px)}}@keyframes catwalk{0%,100%{transform:translateX(-34px)}50%{transform:translateX(38px) scaleX(-1)}}@keyframes sleepy{50%{transform:translateY(3px) rotate(-4deg)}}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:12px}.action{min-height:86px;border-radius:26px;background:var(--card);border:3px solid #fff;box-shadow:var(--shadow);font-weight:1000;font-size:16px;color:#12336e}.action span{display:block;font-size:34px}.action:active,.round:active,.nav:active,.primary:active{transform:scale(.96)}
.panel{padding:16px;margin-top:12px}.panel h2{margin:0 0 12px;font-size:30px}.bars{display:grid;gap:10px}.barrow{display:grid;grid-template-columns:70px 1fr 42px;gap:10px;align-items:center;font-weight:1000}.bar{height:16px;border-radius:999px;background:#e2e8f0;overflow:hidden}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#38bdf8,#8b5cf6,#ff5fb2)}
.gamebox{min-height:500px;border-radius:34px;position:relative;overflow:hidden;background:linear-gradient(180deg,#91e3ff,#bdf0ff 50%,#79d36c);border:3px solid #fff;box-shadow:var(--shadow);margin-top:12px}.gamebox h2{margin:14px;text-align:center}.track{position:absolute;left:20px;right:20px;bottom:68px;height:210px;border-radius:35px;background:linear-gradient(180deg,#eec174,#d6953d);border:8px solid rgba(255,255,255,.8);overflow:hidden}.lane{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 74px,rgba(255,255,255,.28) 74px 82px)}.horse{position:absolute;right:35px;bottom:116px;font-size:76px;transition:.16s;z-index:3}.horse.jump{transform:translateY(-86px) rotate(-8deg)}.coin{position:absolute;font-size:34px;bottom:150px;animation:spin 1.2s linear infinite}.star{position:absolute;font-size:34px;bottom:210px;animation:spin 1.8s linear infinite}@keyframes spin{to{transform:rotateY(360deg)}}.controls{position:absolute;bottom:12px;left:12px;right:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.controls button,.primary{border-radius:22px;min-height:54px;background:linear-gradient(180deg,#fff,#eef6ff);font-weight:1000;color:#12336e;font-size:18px;box-shadow:0 10px 20px rgba(0,0,0,.12)}.primary{background:linear-gradient(180deg,#ffd84f,#ff9a1f);color:#5a3400;padding:0 18px}.scoreline{position:absolute;top:62px;left:16px;right:16px;display:flex;justify-content:space-between;font-weight:1000;background:rgba(255,255,255,.7);border-radius:20px;padding:10px 12px}
.parkgrid,.shopgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.mini{border-radius:28px;background:rgba(255,255,255,.84);border:3px solid #fff;box-shadow:var(--shadow);padding:18px;text-align:center;font-weight:1000}.mini .e{font-size:72px;display:block}.mini p{margin:8px 0;color:var(--muted)}.shopgrid .mini.owned{outline:4px solid rgba(72,199,116,.45)}
.toast{position:fixed;right:14px;left:14px;bottom:102px;margin:auto;max-width:520px;background:#12336e;color:#fff;border-radius:24px;padding:14px 18px;text-align:center;font-weight:1000;box-shadow:0 18px 40px rgba(0,0,0,.25);z-index:80;opacity:0;pointer-events:none;transform:translateY(10px);transition:.2s}.toast.show{opacity:1;transform:none}
.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(720px,100%);height:92px;background:rgba(255,255,255,.94);border:3px solid #fff;border-bottom:0;border-radius:30px 30px 0 0;box-shadow:0 -10px 30px rgba(0,0,0,.12);display:grid;grid-template-columns:repeat(5,1fr);gap:0;z-index:70;padding:7px 8px calc(7px + env(safe-area-inset-bottom))}.nav{background:transparent;border-radius:22px;font-weight:1000;color:#53627c;font-size:12px}.nav span{font-size:27px;display:block}.nav.active{background:linear-gradient(180deg,#ff73bd,#e53f98);color:#fff;box-shadow:0 10px 22px rgba(229,63,152,.28)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.back{border-radius:20px;background:#fff;color:#12336e;min-height:48px;padding:0 14px;font-weight:1000;box-shadow:0 10px 20px rgba(0,0,0,.12)}.upload{display:none}
@media(max-width:760px){.top{grid-template-columns:1fr}.hero h1{font-size:28px}.stats{grid-template-columns:repeat(4,1fr)}.home-world{height:420px}.house{transform:translateX(50%) scale(.82);top:48px}.tree{font-size:72px}.lian-mini{right:calc(50% - 118px);bottom:125px}.cat{right:calc(50% + 24px)}.actions{grid-template-columns:repeat(2,1fr)}.parkgrid,.shopgrid{grid-template-columns:1fr}.barrow{grid-template-columns:62px 1fr 36px}.lian-photo{width:76px;height:76px}.round{width:54px;height:54px}.gamebox{min-height:470px}.horse{font-size:66px}.bottom{height:88px}.nav span{font-size:24px}.nav{font-size:11px}}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active">
  <div class="top">
    <div class="hero card">
      <button class="lian-photo" id="photoBtn" title="לחיצה מגדילה / העלאת תמונה">👧</button>
      <div><h1>הבית של ליאן</h1><p>Lian Pet Tycoon ULTIMATE 4 PRO</p></div>
      <button class="round" id="soundBtn">🔊</button>
      <input id="photoInput" class="upload" type="file" accept="image/*">
    </div>
    <div class="stats card">
      <div class="stat"><i>🪙</i><b id="coins">120</b><small>מטבעות</small></div>
      <div class="stat"><i>⭐</i><b id="stars">8</b><small>כוכבים</small></div>
      <div class="stat"><i>🏆</i><b id="best">0</b><small>שיא</small></div>
      <div class="stat"><i>💎</i><b id="level">1</b><small>רמה</small></div>
    </div>
  </div>
  <div class="home-world card">
    <div class="sunmoon" id="sunmoon">☀️</div><div class="tree t1">🌳</div><div class="tree t2">🌴</div><div class="pool"></div><div class="flowers">🌸🌼🌷</div><div class="path"></div>
    <div class="house"><div class="roof"></div><div class="homebase"><div class="window w1"></div><div class="window w2"></div><div class="door"></div></div></div>
    <div class="lian-mini">👧</div><div class="cat" id="cat">🐱</div><div class="bubble" id="bubble">מיאו! בוא נשחק 💗</div>
  </div>
  <div class="actions">
    <button class="action" onclick="feed()"><span>🍣</span>האכלה</button>
    <button class="action" onclick="playCat()"><span>🧶</span>משחק</button>
    <button class="action" onclick="sleepCat()"><span>🌙</span>שינה</button>
    <button class="action" onclick="petCat()"><span>🫶</span>ליטוף</button>
  </div>
</section>
<section id="pet" class="screen">
  <div class="topbar"><button class="back" onclick="showScreen('home')">🏠 חזרה לבית</button><button class="back" onclick="resetPet()">רענן מצב</button></div>
  <div class="panel card"><h2>🐱 מנצ׳קין PRO</h2><div class="bars">
    <div class="barrow"><span>רעב</span><div class="bar"><span id="hungerBar"></span></div><b id="hungerTxt"></b></div>
    <div class="barrow"><span>שמחה</span><div class="bar"><span id="moodBar"></span></div><b id="moodTxt"></b></div>
    <div class="barrow"><span>אנרגיה</span><div class="bar"><span id="energyBar"></span></div><b id="energyTxt"></b></div>
  </div></div>
  <div class="home-world card"><div class="cat" style="right:45%;bottom:120px;font-size:112px" id="bigCat">🐱</div><div class="bubble" style="right:40%;bottom:255px" id="petBubble">תטפל בי!</div></div>
  <div class="actions"><button class="action" onclick="feed()"><span>🍣</span>האכלה</button><button class="action" onclick="playCat()"><span>🧶</span>משחק</button><button class="action" onclick="sleepCat()"><span>😴</span>שינה</button><button class="action" onclick="petCat()"><span>💗</span>ליטוף</button></div>
</section>
<section id="ride" class="screen">
  <div class="topbar"><button class="back" onclick="showScreen('home')">🏠 חזרה לבית</button><button class="back" onclick="startRide()">התחל רכיבה</button></div>
  <div class="gamebox"><h2>🏇 רכיבה מקצועית</h2><div class="scoreline"><span>ניקוד: <b id="rideScore">0</b></span><span>כוכבים: <b id="rideStars">0</b>/3</span></div><div class="track"><div class="lane"></div><div class="coin" style="left:20%">🪙</div><div class="coin" style="left:52%">🪙</div><div class="star" style="left:74%">⭐</div></div><div class="horse" id="horse">🏇</div><div class="controls"><button onclick="moveHorse(1)">ימינה ◀</button><button onclick="jumpHorse()">קפיצה ⬆</button><button onclick="moveHorse(-1)">▶ שמאלה</button></div></div>
</section>
<section id="park" class="screen">
  <div class="topbar"><button class="back" onclick="showScreen('home')">🏠 חזרה לבית</button><button class="back" onclick="collectParkBonus()">איסוף פרס</button></div>
  <div class="panel card"><h2>🌳 פארק חיות</h2><div class="parkgrid">
    <button class="mini" onclick="parkGame('כלבלב שמח',12)"><span class="e">🐶</span>טיול עם כלבלב<p>אוסף לבבות ומטבעות</p></button>
    <button class="mini" onclick="parkGame('ארנב קופץ',15)"><span class="e">🐰</span>קפיצות ארנב<p>מיני משחק קצר</p></button>
    <button class="mini" onclick="parkGame('תוכי מדבר',18)"><span class="e">🦜</span>סלפי עם תוכי<p>פרס מיוחד</p></button>
    <button class="mini" onclick="parkGame('פוני קטן',20)"><span class="e">🐴</span>פוני בפארק<p>כוכבים נוספים</p></button>
  </div></div>
</section>
<section id="shop" class="screen">
  <div class="topbar"><button class="back" onclick="showScreen('home')">🏠 חזרה לבית</button><button class="back" onclick="saveGame()">שמור</button></div>
  <div class="panel card"><h2>🛍️ חנות</h2><div class="shopgrid" id="shopGrid"></div></div>
</section>
</div>
<nav class="bottom">
  <button class="nav active" data-target="home"><span>🏡</span>בית</button>
  <button class="nav" data-target="pet"><span>🐱</span>מנצ׳קין</button>
  <button class="nav" data-target="ride"><span>🏇</span>רכיבה</button>
  <button class="nav" data-target="park"><span>🌳</span>פארק</button>
  <button class="nav" data-target="shop"><span>🛍️</span>חנות</button>
</nav>
<div class="toast" id="toast"></div>
<script>
const $=s=>document.querySelector(s), $$=s=>document.querySelectorAll(s);
let state={coins:120,stars:8,best:0,level:1,hunger:68,mood:74,energy:66,sound:true,owned:[],night:false,rideScore:0,rideStars:0,horseX:35};
try{const saved=JSON.parse(localStorage.getItem('lianTycoonUltimate4Pro')||'null'); if(saved) state={...state,...saved}; const img=localStorage.getItem('lianPhoto'); if(img) $('#photoBtn').innerHTML='<img src="'+img+'">';}catch(e){}
function saveGame(){localStorage.setItem('lianTycoonUltimate4Pro',JSON.stringify(state)); toast('המשחק נשמר ✅')}
function render(){['coins','stars','best','level'].forEach(k=>$('#'+k).textContent=state[k]); $('#hungerBar')&&($('#hungerBar').style.width=state.hunger+'%', $('#hungerTxt').textContent=state.hunger); $('#moodBar')&&($('#moodBar').style.width=state.mood+'%', $('#moodTxt').textContent=state.mood); $('#energyBar')&&($('#energyBar').style.width=state.energy+'%', $('#energyTxt').textContent=state.energy); document.body.classList.toggle('night',state.night); $('#sunmoon').textContent=state.night?'🌙':'☀️'; $('#best').textContent=state.best; renderShop(); saveGame()}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(window.tt);window.tt=setTimeout(()=>el.classList.remove('show'),1800); if(state.sound) beep()}
function beep(){try{const a=new (window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=660;g.gain.value=.045;o.start();setTimeout(()=>{o.stop();a.close()},90)}catch(e){}}
function showScreen(id){$$('.screen').forEach(s=>s.classList.remove('active')); $('#'+id).classList.add('active'); $$('.nav').forEach(n=>n.classList.toggle('active',n.dataset.target===id)); render()}
$$('.nav').forEach(n=>n.onclick=()=>showScreen(n.dataset.target));
$('#soundBtn').onclick=()=>{state.sound=!state.sound; $('#soundBtn').textContent=state.sound?'🔊':'🔇'; toast(state.sound?'קול הופעל':'קול כבוי')};
$('#photoBtn').onclick=()=>{ $('#photoBtn').classList.toggle('big'); setTimeout(()=>$('#photoBtn').classList.remove('big'),260); $('#photoInput').click(); };
$('#photoInput').onchange=e=>{const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{localStorage.setItem('lianPhoto',r.result); $('#photoBtn').innerHTML='<img src="'+r.result+'">'; toast('התמונה של ליאן עודכנה 💗')}; r.readAsDataURL(f)};
function say(t){$('#bubble').textContent=t; if($('#petBubble')) $('#petBubble').textContent=t}
function clamp(v){return Math.max(0,Math.min(100,Math.round(v)))}
function feed(){state.hunger=clamp(state.hunger+18); state.mood=clamp(state.mood+4); state.coins+=4; say('יאמי! תודה ליאן 🍣'); toast('מנצ׳קין אכל וקיבלת 4 מטבעות') ; render()}
function playCat(){state.mood=clamp(state.mood+16); state.energy=clamp(state.energy-8); state.coins+=8; say('איזה כיף לשחק! 🧶'); toast('משחק מוצלח +8 מטבעות'); render()}
function sleepCat(){state.energy=clamp(state.energy+24); state.hunger=clamp(state.hunger-5); $('#cat').classList.add('sleep'); setTimeout(()=>$('#cat').classList.remove('sleep'),1500); say('זזז... מנוחה טובה 😴'); toast('מנצ׳קין נח והאנרגיה עלתה'); render()}
function petCat(){state.mood=clamp(state.mood+10); state.stars+=1; say('גררר… ליטוף מושלם 💗'); toast('קיבלת כוכב על ליטוף'); render()}
function resetPet(){state.hunger=70;state.mood=70;state.energy=70;toast('מנצ׳קין חזר למצב טוב');render()}
setInterval(()=>{state.hunger=clamp(state.hunger-1);state.energy=clamp(state.energy-1);render()},45000);
setInterval(()=>{state.night=!state.night;render()},120000);
function startRide(){state.rideScore=0;state.rideStars=0;state.horseX=35;$('#rideScore').textContent=0;$('#rideStars').textContent=0;$('#horse').style.right='35px';toast('הרכיבה התחילה! אספי מטבעות וקפצי מעל מכשולים')}
function moveHorse(dir){state.horseX=clamp(state.horseX+dir*18); $('#horse').style.right=state.horseX+'%'; state.rideScore+=10; state.coins+=3; updateRide()}
function jumpHorse(){const h=$('#horse');h.classList.add('jump');setTimeout(()=>h.classList.remove('jump'),420);state.rideScore+=25;state.stars+=1;if(state.rideScore>=75)state.rideStars=Math.min(3,state.rideStars+1);updateRide();toast('קפיצה יפה! +25')}
function updateRide(){if(state.rideScore>state.best)state.best=state.rideScore; $('#rideScore').textContent=state.rideScore; $('#rideStars').textContent=state.rideStars; render()}
function parkGame(name,bonus){state.coins+=bonus;state.mood=clamp(state.mood+8);state.stars+=1;toast(name+' הסתיים! +'+bonus+' מטבעות ⭐');render()}
function collectParkBonus(){state.coins+=30;state.stars+=2;toast('פרס פארק נאסף: 30 מטבעות ו־2 כוכבים');render()}
const items=[['🎀','סרט ורוד',40],['👑','כתר נסיכה',90],['🛏️','מיטת ענן',120],['🧸','צעצוע דובי',55],['🏠','בית חתול יוקרתי',160],['💎','קולר יהלום',200]];
function renderShop(){const g=$('#shopGrid'); if(!g)return; g.innerHTML=items.map((it,i)=>`<button class="mini ${state.owned.includes(i)?'owned':''}" onclick="buy(${i})"><span class="e">${it[0]}</span>${it[1]}<p>${state.owned.includes(i)?'נרכש ✅':it[2]+' מטבעות'}</p></button>`).join('')}
function buy(i){const item=items[i]; if(state.owned.includes(i)){toast('כבר קנית את '+item[1]);return} if(state.coins<item[2]){toast('אין מספיק מטבעות עדיין');return} state.coins-=item[2];state.owned.push(i);state.level+=1;toast('נרכש: '+item[1]+' 🎉');render()}
render();
</script>
</body>
</html>
