<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול תקציב משפחתי</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
  min-height:100vh;
  text-align:center;
  color:#222;
}
header{
  padding:35px 20px 20px;
  color:white;
}
h1{font-size:38px;margin:0;}
p{font-size:19px;}
.container{max-width:1100px;margin:20px auto 50px;padding:20px;}
.panel{
  background:white;
  border-radius:25px;
  padding:25px;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
  margin-bottom:25px;
}
.form{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(165px,1fr));
  gap:12px;
}
input,select,button{
  font-size:17px;
  padding:13px;
  border-radius:14px;
  border:1px solid #ddd;
}
button{
  border:0;
  cursor:pointer;
  font-weight:bold;
  background:#7b61ff;
  color:white;
}
button:hover{opacity:.9;}
.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}
.box{
  background:#f7f7ff;
  border-radius:20px;
  padding:20px;
  font-size:20px;
  font-weight:bold;
}
.income{color:#179b4d;}
.expense{color:#d93025;}
.balance{color:#2457d6;}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.secondary{background:#22a6b3;}
.danger{background:#ff4d6d;}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  font-size:16px;
}
th{background:#f0efff;}
.delete{
  background:#ff4d6d;
  padding:8px 12px;
  border-radius:10px;
}
.back{
  display:inline-block;
  margin-top:10px;
  background:white;
  color:#333;
  text-decoration:none;
  padding:12px 22px;
  border-radius:18px;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,.15);
}
.chartWrap{
  max-width:620px;
  margin:0 auto;
}
canvas{
  max-width:100%;
  background:#fafafa;
  border-radius:18px;
  padding:12px;
}
.small{
  font-size:14px;
  color:#666;
}
footer{color:white;padding:30px;}
@media(max-width:700px){
  h1{font-size:31px;}
  th,td{font-size:14px;padding:8px;}
}
</style>
</head>
<body>

<header>
  <h1>💰 ניהול תקציב משפחתי</h1>
  <p>הכנסות, הוצאות, קטגוריות, גרף וייצוא לאקסל</p>
  <a class="back" href="index.html">⬅ חזרה למסך הבית</a>
</header>

<div class="container">

  <div class="panel">
    <h2>הוספת פעולה</h2>
    <div class="form">
      <select id="type">
        <option value="income">הכנסה</option>
        <option value="expense">הוצאה</option>
      </select>

      <select id="category">
        <option value="משכורת">משכורת</option>
        <option value="מזון">מזון</option>
        <option value="דלק ורכב">דלק ורכב</option>
        <option value="בילויים">בילויים</option>
        <option value="בית וחשבונות">בית וחשבונות</option>
        <option value="ילדים">ילדים</option>
        <option value="בריאות">בריאות</option>
        <option value="אחר">אחר</option>
      </select>

      <input id="desc" type="text" placeholder="תיאור: קניות / משכורת">
      <input id="amount" type="number" placeholder="סכום ₪">
      <input id="date" type="date">

      <button onclick="addTransaction()">הוסף</button>
    </div>
  </div>

  <div class="panel">
    <h2>סיכום</h2>
    <div class="summary">
      <div class="box income">הכנסות<br><span id="incomeTotal">0 ₪</span></div>
      <div class="box expense">הוצאות<br><span id="expenseTotal">0 ₪</span></div>
      <div class="box balance">יתרה<br><span id="balanceTotal">0 ₪</span></div>
      <div class="box">חודש נוכחי<br><span id="monthTotal">0 ₪</span></div>
    </div>
  </div>

  <div class="panel">
    <h2>גרף הכנסות מול הוצאות</h2>
    <div class="chartWrap">
      <canvas id="budgetChart" width="600" height="300"></canvas>
    </div>
    <p class="small">הגרף מתעדכן אוטומטית לפי הנתונים שהזנת.</p>
  </div>

  <div class="panel">
    <h2>פעולות מהירות</h2>
    <div class="actions">
      <button class="secondary" onclick="exportCSV()">ייצוא לאקסל</button>
      <button class="danger" onclick="clearAll()">מחיקת כל הנתונים</button>
    </div>
  </div>

  <div class="panel">
    <h2>רשימת פעולות</h2>
    <table>
      <thead>
        <tr>
          <th>תאריך</th>
          <th>סוג</th>
          <th>קטגוריה</th>
          <th>תיאור</th>
          <th>סכום</th>
          <th>מחיקה</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>

</div>

<footer>
  © 2026 משפחת כהן
</footer>

<script>
let transactions = JSON.parse(localStorage.getItem("familyBudget")) || [];

document.getElementById("date").valueAsDate = new Date();

function save(){
  localStorage.setItem("familyBudget", JSON.stringify(transactions));
}

function addTransaction(){
  const type = document.getElementById("type").value;
  const category = document.getElementById("category").value;
  const desc = document.getElementById("desc").value.trim();
  const amount = Number(document.getElementById("amount").value);
  const date = document.getElementById("date").value;

  if(!desc || !amount || amount <= 0 || !date){
    alert("נא למלא תיאור, סכום ותאריך");
    return;
  }

  transactions.push({
    id: Date.now(),
    type,
    category,
    desc,
    amount,
    date
  });

  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";

  save();
  render();
}

function deleteTransaction(id){
  transactions = transactions.filter(t => t.id !== id);
  save();
  render();
}

function clearAll(){
  if(confirm("למחוק את כל נתוני התקציב?")){
    transactions = [];
    save();
    render();
  }
}

function exportCSV(){
  if(transactions.length === 0){
    alert("אין נתונים לייצוא");
    return;
  }

  let csv = "\uFEFFתאריך,סוג,קטגוריה,תיאור,סכום\n";
  transactions.forEach(t => {
    csv += `${t.date},${t.type === "income" ? "הכנסה" : "הוצאה"},${t.category || ""},${t.desc},${t.amount}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "family-budget.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function drawChart(income, expense){
  const canvas = document.getElementById("budgetChart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const max = Math.max(income, expense, 1);
  const incomeHeight = (income / max) * 190;
  const expenseHeight = (expense / max) * 190;

  ctx.font = "18px Arial";
  ctx.textAlign = "center";

  ctx.fillStyle = "#179b4d";
  ctx.fillRect(160, 240 - incomeHeight, 90, incomeHeight);
  ctx.fillText("הכנסות", 205, 270);
  ctx.fillText(income.toLocaleString() + " ₪", 205, 220 - incomeHeight);

  ctx.fillStyle = "#d93025";
  ctx.fillRect(350, 240 - expenseHeight, 90, expenseHeight);
  ctx.fillText("הוצאות", 395, 270);
  ctx.fillText(expense.toLocaleString() + " ₪", 395, 220 - expenseHeight);
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  let income = 0;
  let expense = 0;
  let monthBalance = 0;

  const now = new Date();
  const currentMonth = now.getMonth();
  const currentYear = now.getFullYear();

  transactions
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .forEach(t => {
      if(t.type === "income") income += t.amount;
      else expense += t.amount;

      const d = new Date(t.date);
      if(d.getMonth() === currentMonth && d.getFullYear() === currentYear){
        monthBalance += t.type === "income" ? t.amount : -t.amount;
      }

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${t.date}</td>
        <td>${t.type === "income" ? "הכנסה" : "הוצאה"}</td>
        <td>${t.category || "אחר"}</td>
        <td>${t.desc}</td>
        <td>${t.amount.toLocaleString()} ₪</td>
        <td><button class="delete" onclick="deleteTransaction(${t.id})">מחק</button></td>
      `;
      list.appendChild(tr);
    });

  document.getElementById("incomeTotal").innerText = income.toLocaleString() + " ₪";
  document.getElementById("expenseTotal").innerText = expense.toLocaleString() + " ₪";
  document.getElementById("balanceTotal").innerText = (income - expense).toLocaleString() + " ₪";
  document.getElementById("monthTotal").innerText = monthBalance.toLocaleString() + " ₪";

  drawChart(income, expense);
}

render();
</script>

</body>
</html>
