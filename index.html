<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הגלריה המשפחתית של ליאן</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f7fa;
}

header{
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
    text-align:center;
    padding:50px 20px;
}

header h1{
    margin:0;
    font-size:42px;
}

header p{
    font-size:20px;
}

.game-button{
    text-align:center;
    margin:30px 0;
}

.game-button a{
    background:#22c55e;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    display:inline-block;
}

.game-button a:hover{
    background:#16a34a;
}

.gallery{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.photo{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.photo img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.caption{
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

footer{
    margin-top:40px;
    background:#111827;
    color:white;
    text-align:center;
    padding:25px;
}

</style>

</head>
<body>

<header>
    <h1>📸 הגלריה המשפחתית של ליאן</h1>
    <p>רגעים יפים, טיולים, חוויות וזכרונות משפחתיים</p>
</header>

<div class="game-button">
    <a href="snakes.html">🎲 משחק סולמות וחבלים</a>
</div>

<div class="gallery">

    <div class="photo">
        <img src="images/photo1.jpg">
        <div class="caption">תמונה משפחתית</div>
    </div>

    <div class="photo">
        <img src="images/photo2.jpg">
        <div class="caption">חופשה משפחתית</div>
    </div>

    <div class="photo">
        <img src="images/photo3.jpg">
        <div class="caption">יום כיף</div>
    </div>

    <div class="photo">
        <img src="images/photo4.jpg">
        <div class="caption">זיכרון מתוק</div>
    </div>

</div>

<footer>
    © 2026 משפחת כהן
</footer>

</body>
</html>
