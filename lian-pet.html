<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>חיית המחמד של ליאן</title>
<style>
*{box-sizing:border-box}
:root{
  --bg1:#fff7fb;--bg2:#eef8ff;--ink:#172033;--muted:#6b7280;--card:rgba(255,255,255,.72);
  --line:rgba(0,0,0,.09);--shadow:0 18px 45px rgba(20,30,60,.13);
  --pink:#ff5aa5;--purple:#8b5cf6;--blue:#3b82f6;--mint:#35d39d;--yellow:#ffd166;
}
body{margin:0;min-height:100vh;font-family:Arial,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 8%,#fff 0 18%,transparent 35%),linear-gradient(135deg,var(--bg1),var(--bg2));text-align:center;overflow-x:hidden}
.app{max-width:1120px;margin:0 auto;padding:18px}
.hero{border:1px solid var(--line);border-radius:34px;padding:24px 16px;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(255,255,255,.48));box-shadow:var(--shadow);backdrop-filter:blur(18px)}
h1{margin:6px 0 6px;font-size:clamp(34px,5vw,56px)}
p{margin:0;color:var(--muted);font-weight:700}.top-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:20px;min-height:52px;padding:0 18px;font-weight:900;font-size:16px;cursor:pointer;background:#fff;box-shadow:0 8px 20px rgba(0,0,0,.08);color:var(--ink)}.btn:hover{transform:translateY(-2px)}.btn.dark{background:#111827;color:#fff}.btn.pink{background:linear-gradient(135deg,#ff7ab8,#ff4d9a);color:#fff}.btn.blue{background:linear-gradient(135deg,#60a5fa,#2563eb);color:#fff}.btn.green{background:linear-gradient(135deg,#6ee7b7,#10b981);color:#fff}
.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-top:16px}.panel{border:1px solid var(--line);border-radius:30px;background:var(--card);box-shadow:var(--shadow);padding:18px;backdrop-filter:blur(18px)}
.stage{min-height:520px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;background:linear-gradient(#bfe9ff 0 56%,#b7efaa 56%);position:relative;overflow:hidden}.stage.night{background:linear-gradient(#1e1b4b 0 56%,#14532d 56%);color:#fff}.stage.beach{background:linear-gradient(#a7f3ff 0 58%,#ffe8a3 58%)}.stage.room{background:linear-gradient(#fff7ed 0 64%,#e5c8a9 64%)}
.coins{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.75);border-radius:999px;padding:10px 16px;font-weight:900;box-shadow:0 8px 18px rgba(0,0,0,.10)}.level{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.75);border-radius:999px;padding:10px 16px;font-weight:900;box-shadow:0 8px 18px rgba(0,0,0,.10)}
.pet-wrap{margin-top:90px;position:relative}.pet{font-size:160px;line-height:1;filter:drop-shadow(0 18px 22px rgba(0,0,0,.18));animation:breathe 2.2s ease-in-out infinite}.hat{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:58px;display:none}.hat.show{display:block}.name{font-size:34px;font-weight:1000;margin-top:8px}.mood{font-size:18px;font-weight:900;color:#374151;background:rgba(255,255,255,.65);border-radius:999px;padding:9px 15px;display:inline-block;margin-top:8px}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.04)}}
.stats{width:100%;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}.stat{background:rgba(255,255,255,.72);border-radius:18px;padding:10px;border:1px solid rgba(255,255,255,.55)}.stat b{display:block;font-size:14px}.bar{height:11px;background:rgba(0,0,0,.10);border-radius:999px;overflow:hidden;margin-top:7px}.fill{height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,#ff5aa5,#8b5cf6)}
.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.actions .btn{height:64px}.section-title{margin:8px 0 12px;font-size:22px;font-weight:1000}.shop{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.shop-card{background:rgba(255,255,255,.78);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 8px 20px rgba(0,0,0,.06)}.shop-card .big{font-size:42px}.shop-card b{display:block}.small{font-size:13px;color:var(--muted);font-weight:800}.pet-select{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0}.pet-chip{border:2px solid transparent;background:#fff;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer}.pet-chip.active{border-color:#111827;background:#111827;color:#fff}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:13px 20px;font-weight:900;box-shadow:0 12px 28px rgba(0,0,0,.25);display:none;z-index:50}.toast.show{display:block}.sparkle{position:absolute;font-size:26px;animation:pop 900ms ease forwards;pointer-events:none}@keyframes pop{to{transform:translateY(-80px) scale(1.8);opacity:0}}
@media(max-width:820px){.app{padding:10px}.hero{border-radius:26px}.grid{grid-template-columns:1fr}.stage{min-height:470px}.pet{font-size:128px}.stats{grid-template-columns:repeat(2,1fr)}.actions,.shop{grid-template-columns:1fr 1fr}.btn{font-size:14px;padding:0 12px}.panel{border-radius:24px;padding:14px}}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>🐾 חיית המחמד של ליאן</h1>
    <p>מאכילים, משחקים, מרוויחים מטבעות וקונים אביזרים לחיה הקסומה</p>
    <div class="top-actions"><a class="btn dark" href="index.html" style="text-decoration:none;display:inline-flex;align-items:center">⌂ דף הבית</a><button class="btn" onclick="resetGame()">איפוס משחק</button></div>
  </div>

  <div class="grid">
    <div class="panel stage" id="stage">
      <div class="coins">💰 <span id="coins">0</span></div>
      <div class="level">⭐ שלב <span id="level">1</span></div>
      <div class="pet-wrap">
        <div class="hat" id="hat">👑</div>
        <div class="pet" id="pet">🐶</div>
        <div class="name">LIAN PET</div>
        <div class="mood" id="mood">שמחה לראות אותך!</div>
      </div>
      <div class="stats">
        <div class="stat"><b>אוכל 🍎</b><div class="bar"><div class="fill" id="hunger"></div></div></div>
        <div class="stat"><b>שמחה 💖</b><div class="bar"><div class="fill" id="happy"></div></div></div>
        <div class="stat"><b>ניקיון 🛁</b><div class="bar"><div class="fill" id="clean"></div></div></div>
        <div class="stat"><b>אנרגיה ⚡</b><div class="bar"><div class="fill" id="energy"></div></div></div>
      </div>
    </div>

    <div>
      <div class="panel">
        <div class="section-title">בחר חיה</div>
        <div class="pet-select">
          <button class="pet-chip active" onclick="choosePet(this,'🐶')">🐶 כלב</button>
          <button class="pet-chip" onclick="choosePet(this,'🦄')">🦄 חד־קרן</button>
          <button class="pet-chip" onclick="choosePet(this,'🐱')">🐱 חתול</button>
          <button class="pet-chip" onclick="choosePet(this,'🐰')">🐰 ארנב</button>
        </div>
        <div class="section-title">פעולות</div>
        <div class="actions">
          <button class="btn pink" onclick="feedPet()">🍎 האכלה</button>
          <button class="btn blue" onclick="playPet()">🎾 משחק</button>
          <button class="btn green" onclick="washPet()">🛁 מקלחת</button>
          <button class="btn" onclick="sleepPet()">🌙 שינה</button>
        </div>
      </div>

      <div class="panel" style="margin-top:16px">
        <div class="section-title">חנות</div>
        <div class="shop">
          <div class="shop-card"><div class="big">👑</div><b>כתר</b><span class="small">50 מטבעות</span><button class="btn" onclick="buyHat('👑',50)">קנה</button></div>
          <div class="shop-card"><div class="big">🎀</div><b>פפיון</b><span class="small">40 מטבעות</span><button class="btn" onclick="buyHat('🎀',40)">קנה</button></div>
          <div class="shop-card"><div class="big">🏖️</div><b>חוף ים</b><span class="small">60 מטבעות</span><button class="btn" onclick="buyBg('beach',60)">קנה</button></div>
          <div class="shop-card"><div class="big">🌙</div><b>לילה</b><span class="small">60 מטבעות</span><button class="btn" onclick="buyBg('night',60)">קנה</button></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const defaultState={coins:20,level:1,xp:0,pet:'🐶',hat:'',bg:'park',hunger:70,happy:70,clean:70,energy:70};
let state=load();
function load(){try{return {...defaultState,...JSON.parse(localStorage.getItem('lianPetGame')||'{}')}}catch(e){return {...defaultState}}}
function save(){localStorage.setItem('lianPetGame',JSON.stringify(state))}
function clamp(v){return Math.max(0,Math.min(100,v))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
function update(){document.getElementById('coins').textContent=state.coins;document.getElementById('level').textContent=state.level;document.getElementById('pet').textContent=state.pet;document.getElementById('hat').textContent=state.hat||'';document.getElementById('hat').classList.toggle('show',!!state.hat);['hunger','happy','clean','energy'].forEach(k=>document.getElementById(k).style.width=clamp(state[k])+'%');const stage=document.getElementById('stage');stage.className='panel stage '+(state.bg||'');let avg=(state.hunger+state.happy+state.clean+state.energy)/4;document.getElementById('mood').textContent=avg>80?'מאושרת ומלאת קסם ✨':avg>55?'מרגישה טוב 💖':'צריכה טיפול קטן 🥺';save()}
function reward(amount,msg){state.coins+=amount;state.xp+=amount;if(state.xp>=100){state.level++;state.xp=0;toast('עלית לשלב '+state.level+'! ⭐')}else toast(msg+' +'+amount+' מטבעות');sparkles();update()}
function feedPet(){state.hunger=clamp(state.hunger+18);state.energy=clamp(state.energy+5);reward(8,'יאמי')}
function playPet(){state.happy=clamp(state.happy+20);state.energy=clamp(state.energy-10);state.clean=clamp(state.clean-6);reward(10,'איזה כיף')}
function washPet(){state.clean=clamp(state.clean+22);state.happy=clamp(state.happy+4);reward(7,'נקי ומבריק')}
function sleepPet(){state.energy=clamp(state.energy+24);state.hunger=clamp(state.hunger-7);reward(6,'חלומות קסומים')}
function choosePet(btn,pet){document.querySelectorAll('.pet-chip').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.pet=pet;toast('נבחרה חיה חדשה!');sparkles();update()}
function buyHat(hat,price){if(state.coins<price)return toast('אין מספיק מטבעות');state.coins-=price;state.hat=hat;toast('קנית אביזר חדש!');update()}
function buyBg(bg,price){if(state.coins<price)return toast('אין מספיק מטבעות');state.coins-=price;state.bg=bg;toast('הרקע הוחלף!');update()}
function sparkles(){for(let i=0;i<10;i++){const s=document.createElement('div');s.className='sparkle';s.textContent=['✨','💖','⭐','🌈'][i%4];s.style.left=(45+Math.random()*20)+'%';s.style.top=(35+Math.random()*22)+'%';document.getElementById('stage').appendChild(s);setTimeout(()=>s.remove(),950)}}
function resetGame(){if(confirm('לאפס את המשחק?')){state={...defaultState};localStorage.removeItem('lianPetGame');update();toast('המשחק אופס')}}
setInterval(()=>{state.hunger=clamp(state.hunger-.4);state.happy=clamp(state.happy-.25);state.clean=clamp(state.clean-.18);state.energy=clamp(state.energy-.22);update()},15000);
update();
</script>
</body>
</html>
