<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lian Space Invasion</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--ink:#f8fafc;--muted:rgba(248,250,252,.72);--glass:rgba(8,18,35,.62);--line:rgba(125,211,252,.28);--cyan:#67e8f9;--green:#22c55e;--red:#fb7185;--yellow:#fde047}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,"Segoe UI",sans-serif;color:var(--ink);background:#020617}
body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 50% 0%,rgba(34,211,238,.28),transparent 28%),radial-gradient(circle at 15% 35%,rgba(168,85,247,.20),transparent 25%),linear-gradient(180deg,#020617 0%,#06101f 55%,#020617 100%);z-index:-3}
body:after{content:"";position:fixed;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px),radial-gradient(rgba(103,232,249,.9) 1px,transparent 1px);background-size:42px 42px,91px 91px;background-position:0 0,12px 18px;opacity:.45;z-index:-2;animation:stars 18s linear infinite}
@keyframes stars{to{transform:translateY(42px)}}
.back{position:fixed;top:12px;right:12px;z-index:40;border:1px solid var(--line);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:10px 14px;font-weight:1000;backdrop-filter:blur(16px)}
.app{position:relative;width:100vw;height:100dvh;overflow:hidden}
.hud{position:absolute;top:10px;left:10px;right:10px;z-index:10;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:start;pointer-events:none}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(8,18,35,.78),rgba(8,18,35,.42));box-shadow:0 12px 38px rgba(0,0,0,.34),inset 0 0 22px rgba(103,232,249,.08);backdrop-filter:blur(16px);border-radius:18px;padding:9px 11px;font-weight:1000;text-shadow:0 0 12px rgba(103,232,249,.55)}
.hud .center{text-align:center;min-width:145px}.hud b{display:block;color:#34d399;font-size:12px;letter-spacing:1px}.hud span{font-size:20px}.rightHud{text-align:right}.leftHud{text-align:left}
.pause{pointer-events:auto;border:1px solid var(--line);background:rgba(255,255,255,.10);color:#fff;border-radius:16px;padding:10px 13px;font-size:20px;font-weight:1000;box-shadow:inset 0 0 18px rgba(103,232,249,.10)}
#game{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
.city{position:absolute;left:0;right:0;bottom:0;height:23vh;z-index:1;background:linear-gradient(180deg,transparent,rgba(0,0,0,.48) 35%,rgba(0,0,0,.84)),linear-gradient(90deg,transparent 0 3%,rgba(255,255,255,.08) 3% 4%,transparent 4% 7%,rgba(255,255,255,.12) 7% 8%,transparent 8% 12%);pointer-events:none;overflow:hidden}
.skyline{position:absolute;left:0;right:0;bottom:0;height:68%;display:flex;align-items:end;gap:4px;padding:0 5px;opacity:.88}.bld{flex:1;min-width:10px;background:linear-gradient(180deg,#0b1730,#020617);border:1px solid rgba(103,232,249,.12);box-shadow:0 0 16px rgba(56,189,248,.08)}.bld:after{content:"";display:block;height:100%;background:repeating-linear-gradient(180deg,rgba(255,214,102,.95) 0 2px,transparent 2px 11px);opacity:.42}
.controls{position:absolute;left:6px;right:10px;bottom:14px;z-index:12;display:flex;justify-content:space-between;align-items:end;gap:12px}.pad{display:flex;gap:8px;margin-left:0}.ctrl{width:74px;height:60px;border-radius:20px;border:1px solid rgba(103,232,249,.45);background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.055));color:#fff;font-size:34px;font-weight:1000;box-shadow:0 12px 34px rgba(0,0,0,.35),inset 0 0 22px rgba(103,232,249,.14);backdrop-filter:blur(14px)}.fire{width:96px;font-size:23px;color:#fff}.sound{position:absolute;bottom:92px;left:14px;z-index:14;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.09);color:#fff;font-size:19px}
.overlay{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(2,6,23,.52);backdrop-filter:blur(10px)}.card{width:min(520px,100%);border:1px solid rgba(103,232,249,.35);background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(15,23,42,.64));border-radius:30px;padding:24px;text-align:center;box-shadow:0 28px 90px rgba(0,0,0,.58),inset 0 0 35px rgba(103,232,249,.08)}.badge{display:inline-flex;padding:7px 13px;border-radius:999px;border:1px solid rgba(103,232,249,.35);background:rgba(103,232,249,.10);font-size:12px;font-weight:1000;color:#67e8f9;letter-spacing:1px}.card h1{font-size:clamp(36px,8vw,62px);margin:12px 0 8px}.card p{color:var(--muted);font-weight:800;line-height:1.55}.btn{border:none;border-radius:18px;padding:14px 20px;background:#fff;color:#071018;font-weight:1000;font-size:17px;box-shadow:0 14px 35px rgba(0,0,0,.35);margin:5px}.btn.dark{background:rgba(255,255,255,.11);color:#fff;border:1px solid var(--line)}.hidden{display:none!important}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:25}.flash.go{animation:flash .18s}@keyframes flash{50%{opacity:.18}}
@media(max-width:640px){.hud{grid-template-columns:1fr auto 1fr;gap:5px}.panel{padding:7px 8px;border-radius:15px}.hud b{font-size:10px}.hud span{font-size:16px}.hud .center{min-width:105px}.ctrl{width:64px;height:52px;font-size:30px}.fire{width:86px;font-size:20px}.back{font-size:12px;padding:8px 11px}.controls{bottom:10px;left:4px}.sound{bottom:72px}.city{height:21vh}}
</style>
</head>
<body>
<button class="back" onclick="location.href='index.html'">← חזרה</button>
<div class="app">
  <canvas id="game"></canvas>
  <div class="city"><div class="skyline" id="skyline"></div></div>
  <div class="flash" id="flash"></div>
  <div class="hud">
    <div class="panel rightHud"><b>ניקוד</b><span id="score">000000</span></div>
    <button class="pause" id="pauseBtn">Ⅱ</button>
    <div class="panel leftHud"><b>חיים · שלב</b><span><span id="lives">❤️❤️❤️</span> · <span id="level">1</span></span></div>
  </div>
  <button class="sound" id="soundBtn">🔊</button>
  <div class="controls">
    <div class="pad"><button class="ctrl" id="leftBtn">◀</button><button class="ctrl" id="rightBtn">▶</button></div>
    <button class="ctrl fire" id="fireBtn">FIRE</button>
  </div>
  <div class="overlay" id="startScreen">
    <div class="card">
      <div class="badge">LIAN SPACE DEFENSE</div>
      <h1>🚀 פלישת חלליות</h1>
      <p>כדור הארץ תחת מתקפה. הזז את החללית, ירה בלייזרים, עצור את הפולשים וצבור נקודות. מותאם לטלפון.</p>
      <button class="btn" id="startBtn">התחל משחק</button>
      <button class="btn dark" id="howBtn">איך משחקים?</button>
      <p id="how" class="hidden">בטלפון: אפשר לגרור את החללית על המסך או להשתמש בחצים. FIRE לירי. במחשב: חצים או A/D ורווח לירי.</p>
    </div>
  </div>
  <div class="overlay hidden" id="endScreen"><div class="card"><div class="badge" id="endBadge">GAME OVER</div><h1 id="endTitle">המשחק נגמר</h1><p id="endText"></p><button class="btn" id="againBtn">שחק שוב</button><button class="btn dark" onclick="location.href='index.html'">חזרה לאתר</button></div></div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W=0,H=0,DPR=1,score=0,level=1,lives=3,running=false,paused=false,last=0,keys={},shots=[],enemyShots=[],aliens=[],particles=[],barriers=[],cool=0,dir=1,dropTimer=0,soundOn=true,best=+(localStorage.getItem('lianSpaceBest')||0);
const player={x:0,y:0,w:36,h:50,speed:720,targetX:null,hit:0};
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);player.y=H-118;player.x=Math.max(45,Math.min(W-45,player.x||W/2));makeBarriers()}addEventListener('resize',resize);
function ui(){scoreEl.textContent=String(score).padStart(6,'0');levelEl.textContent=level;livesEl.textContent='❤️'.repeat(Math.max(0,lives))}
const scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),livesEl=document.getElementById('lives');
function makeSky(){let s='';for(let i=0;i<42;i++){let h=22+Math.random()*78;s+=`<div class="bld" style="height:${h}%"></div>`}skyline.innerHTML=s}
function makeAliens(){aliens=[];const rows=Math.min(5,3+Math.floor(level/2)),cols=Math.min(10,6+level);const gapX=Math.min(62,(W-44)/cols),gapY=42,startX=(W-gapX*(cols-1))/2;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)aliens.push({x:startX+c*gapX,y:82+r*gapY,w:26,h:20,row:r,alive:true,phase:Math.random()*6,color:['#fb7185','#c084fc','#60a5fa','#34d399','#fde047'][r%5]})}
function makeBarriers(){barriers=[]}
function reset(){score=0;level=1;lives=3;shots=[];enemyShots=[];particles=[];dir=1;paused=false;player.x=W/2;player.y=H-118;makeAliens();makeBarriers();ui()}
function start(){startScreen.classList.add('hidden');endScreen.classList.add('hidden');reset();running=true;last=performance.now();requestAnimationFrame(loop)}
function nextLevel(){level++;score+=250;shots=[];enemyShots=[];dir=1;makeAliens();makeBarriers();toast('שלב '+level);ui()}
function toast(t){endBadge.textContent=t;flash.classList.add('go');setTimeout(()=>flash.classList.remove('go'),190)}
function fire(){if(!running||paused||cool>0)return;shots.push({x:player.x,y:player.y-34,v:-690});cool=.22;beep(620,.05,'square')}
function explode(x,y,color,n=16){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=80+Math.random()*210;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.45+Math.random()*.35,color})}}
function hitPlayer(){if(player.hit>0)return;lives--;player.hit=1.25;explode(player.x,player.y,'#67e8f9',28);beep(160,.18,'sawtooth');ui();if(lives<=0)gameOver()}
function gameOver(win=false){running=false;localStorage.setItem('lianSpaceBest',Math.max(best,score));endBadge.textContent=win?'ניצחון':'GAME OVER';endTitle.textContent=win?'הצלת את כדור הארץ!':'הפולשים הגיעו';endText.textContent=`ניקוד: ${score} · שיא קודם: ${best}`;endScreen.classList.remove('hidden')}
function update(dt){if(paused)return;cool=Math.max(0,cool-dt);player.hit=Math.max(0,player.hit-dt);let mv=(keys.ArrowRight||keys.d?1:0)-(keys.ArrowLeft||keys.a?1:0);if(player.targetX!==null){let dx=player.targetX-player.x;player.x+=Math.max(-player.speed*dt,Math.min(player.speed*dt,dx));if(Math.abs(dx)<4)player.targetX=null}else{player.x+=mv*player.speed*dt}player.x=Math.max(30,Math.min(W-30,player.x));if(keys[' ']||keys.Space)fire();
 shots.forEach(s=>s.y+=s.v*dt);enemyShots.forEach(s=>s.y+=s.v*dt);shots=shots.filter(s=>s.y>-20);enemyShots=enemyShots.filter(s=>s.y<H+30);
 let minX=99999,maxX=-99999,lowest=0;aliens.filter(a=>a.alive).forEach(a=>{minX=Math.min(minX,a.x-a.w/2);maxX=Math.max(maxX,a.x+a.w/2);lowest=Math.max(lowest,a.y)});let speed=28+level*9;if(maxX>W-18&&dir>0)dir=-1,dropTimer=.15;if(minX<18&&dir<0)dir=1,dropTimer=.15;aliens.forEach(a=>{if(!a.alive)return;a.x+=dir*speed*dt;a.phase+=dt*4;if(dropTimer>0)a.y+=34*dt/.15});dropTimer=Math.max(0,dropTimer-dt);
 if(Math.random()<dt*(.6+level*.17)){let live=aliens.filter(a=>a.alive);if(live.length){let a=live[Math.floor(Math.random()*live.length)];enemyShots.push({x:a.x,y:a.y+18,v:210+level*22})}}
 for(const s of shots){for(const a of aliens){if(!a.alive)continue;if(Math.abs(s.x-a.x)<a.w/2+4&&Math.abs(s.y-a.y)<a.h/2+8){a.alive=false;s.y=-999;score+=10+(5-a.row)*5+level*2;explode(a.x,a.y,a.color);beep(320,.06,'triangle');ui();break}}}
 for(const b of barriers){for(const s of shots){if(b.hp>0&&Math.abs(s.x-b.x)<b.w/2&&s.y>b.y-b.h/2&&s.y<b.y+b.h/2){b.hp--;s.y=-999}}for(const e of enemyShots){if(b.hp>0&&Math.abs(e.x-b.x)<b.w/2&&e.y>b.y-b.h/2&&e.y<b.y+b.h/2){b.hp--;e.y=H+999}}}
 enemyShots.forEach(e=>{if(Math.abs(e.x-player.x)<26&&Math.abs(e.y-player.y)<28){e.y=H+999;hitPlayer()}});if(lowest>H-170)hitPlayer();particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;p.life-=dt});particles=particles.filter(p=>p.life>0);if(aliens.every(a=>!a.alive))nextLevel()}
function drawShip(x,y,scale=1){ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.shadowColor='#67e8f9';ctx.shadowBlur=18;ctx.fillStyle='#dbeafe';ctx.beginPath();ctx.moveTo(0,-34);ctx.lineTo(19,24);ctx.lineTo(0,14);ctx.lineTo(-19,24);ctx.closePath();ctx.fill();ctx.fillStyle='#ef4444';ctx.fillRect(-7,-18,14,16);ctx.fillStyle='#38bdf8';ctx.beginPath();ctx.ellipse(0,0,7,16,0,0,7);ctx.fill();ctx.fillStyle='#f97316';ctx.beginPath();ctx.moveTo(-8,25);ctx.lineTo(0,46+Math.random()*8);ctx.lineTo(8,25);ctx.fill();ctx.restore()}
function drawAlien(a){ctx.save();ctx.translate(a.x,a.y);ctx.scale(.78,.78);ctx.shadowColor=a.color;ctx.shadowBlur=14;ctx.fillStyle=a.color;let bob=Math.sin(a.phase)*2;ctx.translate(0,bob);ctx.beginPath();ctx.roundRect(-17,-12,34,23,9);ctx.fill();ctx.fillStyle='rgba(255,255,255,.9)';ctx.beginPath();ctx.arc(-7,-3,3,0,7);ctx.arc(7,-3,3,0,7);ctx.fill();ctx.strokeStyle=a.color;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-17,4);ctx.lineTo(-27,16);ctx.moveTo(17,4);ctx.lineTo(27,16);ctx.moveTo(-9,10);ctx.lineTo(-15,20);ctx.moveTo(9,10);ctx.lineTo(15,20);ctx.stroke();ctx.restore()}
function drawBarrier(b){if(b.hp<=0)return;ctx.save();ctx.globalAlpha=.35+.65*b.hp/18;ctx.fillStyle='#94a3b8';ctx.shadowColor='#e2e8f0';ctx.shadowBlur=8;ctx.beginPath();ctx.roundRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h,8);ctx.fill();ctx.fillStyle='#020617';ctx.beginPath();ctx.roundRect(b.x-16,b.y+4,32,20,6);ctx.fill();ctx.restore()}
function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='rgba(103,232,249,.04)';ctx.fillRect(0,0,W,H);barriers.forEach(drawBarrier);aliens.filter(a=>a.alive).forEach(drawAlien);ctx.lineCap='round';shots.forEach(s=>{ctx.strokeStyle='#60a5fa';ctx.shadowColor='#60a5fa';ctx.shadowBlur=18;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y+23);ctx.stroke()});enemyShots.forEach(s=>{ctx.strokeStyle='#fb7185';ctx.shadowColor='#fb7185';ctx.shadowBlur=14;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x,s.y-17);ctx.stroke()});particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,7);ctx.fill();ctx.globalAlpha=1});ctx.globalAlpha=player.hit>0?(Math.sin(performance.now()/60)>.1?.45:1):1;drawShip(player.x,player.y,1);ctx.globalAlpha=1;if(paused){ctx.fillStyle='rgba(2,6,23,.45)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='900 42px Arial';ctx.textAlign='center';ctx.fillText('PAUSED',W/2,H/2)}}
function loop(t){let dt=Math.min(.033,(t-last)/1000);last=t;if(running){update(dt);draw();requestAnimationFrame(loop)}}
function beep(freq=440,dur=.08,type='sine'){if(!soundOn)return;try{let A=window.AudioContext||window.webkitAudioContext,a=new A(),o=a.createOscillator(),g=a.createGain();o.type=type;o.frequency.value=freq;g.gain.value=.045;o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur)}catch(e){}}
function hold(btn,key){btn.addEventListener('pointerdown',e=>{e.preventDefault();keys[key]=true;if(key===' ')fire();btn.setPointerCapture(e.pointerId)});['pointerup','pointercancel','pointerleave'].forEach(ev=>btn.addEventListener(ev,()=>keys[key]=false))}
hold(leftBtn,'ArrowLeft');hold(rightBtn,'ArrowRight');hold(fireBtn,' ');addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' ')fire();if(e.key==='p')togglePause()});addEventListener('keyup',e=>keys[e.key]=false);pauseBtn.onclick=togglePause;function togglePause(){if(!running)return;paused=!paused;pauseBtn.textContent=paused?'▶':'Ⅱ'}
startBtn.onclick=start;againBtn.onclick=start;howBtn.onclick=()=>how.classList.toggle('hidden');soundBtn.onclick=()=>{soundOn=!soundOn;soundBtn.textContent=soundOn?'🔊':'🔇'};

let pointerMoveId=null;
canvas.addEventListener('pointerdown',e=>{
  if(!running||paused)return;
  pointerMoveId=e.pointerId;
  canvas.setPointerCapture(pointerMoveId);
  player.targetX=e.clientX;
}, {passive:true});
canvas.addEventListener('pointermove',e=>{
  if(!running||paused||pointerMoveId!==e.pointerId)return;
  player.targetX=e.clientX;
}, {passive:true});
canvas.addEventListener('pointerup',e=>{
  if(pointerMoveId===e.pointerId) pointerMoveId=null;
}, {passive:true});
canvas.addEventListener('pointercancel',e=>{
  if(pointerMoveId===e.pointerId) pointerMoveId=null;
}, {passive:true});

if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);return this}}
makeSky();resize();ui();draw();
</script>
</body>
</html>
