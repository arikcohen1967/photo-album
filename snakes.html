<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>סולמות וחבלים</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f2f7ff;
      margin: 0;
      padding: 20px;
    }

    h1 { color: #2c3e50; }

    #board {
      width: 600px;
      height: 600px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      border: 4px solid #333;
      background: white;
    }

    .cell {
      border: 1px solid #ccc;
      position: relative;
      font-size: 14px;
      padding: 4px;
    }

    .player {
      width: 22px;
      height: 22px;
      background: red;
      border-radius: 50%;
      position: absolute;
      bottom: 5px;
      left: 5px;
    }

    .ladder { background: #d4ffd4; }
    .snake { background: #ffd6d6; }

    button {
      font-size: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    #message {
      font-size: 22px;
      margin-top: 15px;
      font-weight: bold;
    }

    a {
      display: inline-block;
      margin-top: 25px;
      color: #2563eb;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>משחק סולמות וחבלים</h1>

<button onclick="rollDice()">זרוק קובייה 🎲</button>
<div id="message">אתה במשבצת 1</div>

<div id="board"></div>

<a href="index.html">חזרה לגלריית התמונות</a>

<script>
  const board = document.getElementById("board");
  const message = document.getElementById("message");

  let playerPosition = 1;

  const ladders = {
    4: 14,
    9: 31,
    20: 38,
    28: 84,
    40: 59,
    63: 81
  };

  const snakes = {
    17: 7,
    54: 34,
    62: 19,
    64: 60,
    87: 24,
    93: 73,
    95: 75,
    99: 78
  };

  function createBoard() {
    board.innerHTML = "";

    for (let row = 9; row >= 0; row--) {
      let cells = [];

      for (let col = 1; col <= 10; col++) {
        let num = row * 10 + col;
        cells.push(num);
      }

      if (row % 2 === 1) cells.reverse();

      cells.forEach(num => {
        const cell = document.createElement("div");
        cell.className = "cell";

        if (ladders[num]) cell.classList.add("ladder");
        if (snakes[num]) cell.classList.add("snake");

        cell.innerHTML = num;

        if (num === playerPosition) {
          const player = document.createElement("div");
          player.className = "player";
          cell.appendChild(player);
        }

        board.appendChild(cell);
      });
    }
  }

  function rollDice() {
    if (playerPosition === 100) return;

    const dice = Math.floor(Math.random() * 6) + 1;
    let newPosition = playerPosition + dice;

    if (newPosition > 100) {
      message.innerText = `יצא ${dice}. צריך מספר מדויק כדי להגיע ל־100`;
      return;
    }

    playerPosition = newPosition;

    if (ladders[playerPosition]) {
      message.innerText = `יצא ${dice}. עלית בסולם מ־${playerPosition} ל־${ladders[playerPosition]}!`;
      playerPosition = ladders[playerPosition];
    } else if (snakes[playerPosition]) {
      message.innerText = `יצא ${dice}. ירדת בחבל מ־${playerPosition} ל־${snakes[playerPosition]}!`;
      playerPosition = snakes[playerPosition];
    } else {
      message.innerText = `יצא ${dice}. אתה במשבצת ${playerPosition}`;
    }

    if (playerPosition === 100) {
      message.innerText = "ניצחת! 🎉 הגעת למשבצת 100";
    }

    createBoard();
  }

  createBoard();
</script>

</body>
</html>
